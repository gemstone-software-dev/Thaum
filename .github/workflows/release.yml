name: Release

on:
  push:
    branches: [debug]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      registry:
        description: Registry hostname for docker login (e.g. ghcr.io, docker.io)
        type: string
        default: ghcr.io
      image:
        description: Full image path without tag (e.g. ghcr.io/org/repo). Empty uses REGISTRY + this repo (lowercase).
        type: string
        default: ""
      python_version:
        description: PYTHON_VERSION passed to the Dockerfile build-arg
        type: string
        default: "3.13"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run tests
        run: python -m unittest discover -s tests -t .

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Resolve registry, image, version, and tags
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REGISTRY="${{ github.event.inputs.registry }}"
            IMAGE="${{ github.event.inputs.image }}"
            PYVER="${{ github.event.inputs.python_version }}"
          else
            REGISTRY="ghcr.io"
            IMAGE=""
            PYVER="3.13"
          fi
          if [ -z "${REGISTRY}" ]; then
            REGISTRY="ghcr.io"
          fi
          if [ -z "${PYVER}" ]; then
            PYVER="3.13"
          fi
          if [ -z "${IMAGE}" ]; then
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="${REGISTRY}/${REPO_LOWER}"
          fi
          IMAGE_AZURE="${IMAGE}-azure"
          IMAGE_EXTERNAL="${IMAGE}-external-db"
          IMAGE_AZURE_EXTERNAL="${IMAGE_AZURE}-external-db"

          VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )

          GEMSTONE_REF=$(python - <<'PY'
          import re
          with open("requirements.txt", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if line.startswith("gemstone_utils") and "git+" in line:
                      m = re.search(r"@([^#\s]+)", line)
                      if m:
                          print(m.group(1))
                          break
              else:
                  raise SystemExit("gemstone_utils pin not found in requirements.txt")
          PY
          )

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export REF_NAME="${{ github.ref_name }}"
            EDGE_TAG=$(python - <<'PY'
          import hashlib
          import os
          import re

          ref = os.environ.get("REF_NAME", "").strip()
          if ref == "main":
              print("edge")
          else:
              s = ref.lower().replace("/", "-")
              s = re.sub(r"[^a-z0-9._-]+", "-", s)
              s = re.sub(r"-+", "-", s).strip("-")
              if not s:
                  s = hashlib.sha256(ref.encode()).hexdigest()[:12]
              # "edge-" + suffix <= OCI tag length 128
              max_suffix = 123
              if len(s) > max_suffix:
                  s = s[:max_suffix]
              print(f"edge-{s}")
          PY
          )
            THAUM_IMAGE_CHANNEL="${EDGE_TAG}"
            {
              echo 'TAGS<<__THAUM_TAGS__'
              echo "${IMAGE}:${EDGE_TAG}"
              echo '__THAUM_TAGS__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_AZURE<<__THAUM_TAGS_AZURE__'
              echo "${IMAGE_AZURE}:${EDGE_TAG}"
              echo '__THAUM_TAGS_AZURE__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_EXTERNAL<<__THAUM_TAGS_EXTERNAL__'
              echo "${IMAGE_EXTERNAL}:${EDGE_TAG}"
              echo '__THAUM_TAGS_EXTERNAL__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_AZURE_EXTERNAL<<__THAUM_TAGS_AZURE_EXTERNAL__'
              echo "${IMAGE_AZURE_EXTERNAL}:${EDGE_TAG}"
              echo '__THAUM_TAGS_AZURE_EXTERNAL__'
            } >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "debug" ]; then
            THAUM_IMAGE_CHANNEL="edge-debug"
            {
              echo 'TAGS<<__THAUM_TAGS__'
              echo "${IMAGE}:edge-debug"
              echo '__THAUM_TAGS__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_AZURE<<__THAUM_TAGS_AZURE__'
              echo "${IMAGE_AZURE}:edge-debug"
              echo '__THAUM_TAGS_AZURE__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_EXTERNAL<<__THAUM_TAGS_EXTERNAL__'
              echo "${IMAGE_EXTERNAL}:edge-debug"
              echo '__THAUM_TAGS_EXTERNAL__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_AZURE_EXTERNAL<<__THAUM_TAGS_AZURE_EXTERNAL__'
              echo "${IMAGE_AZURE_EXTERNAL}:edge-debug"
              echo '__THAUM_TAGS_AZURE_EXTERNAL__'
            } >> "$GITHUB_ENV"
          elif [ "${{ github.event.release.prerelease }}" = "true" ]; then
            THAUM_IMAGE_CHANNEL="devel"
            {
              echo 'TAGS<<__THAUM_TAGS__'
              echo "${IMAGE}:${VERSION}"
              echo "${IMAGE}:devel"
              echo "${IMAGE}:edge"
              echo '__THAUM_TAGS__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_AZURE<<__THAUM_TAGS_AZURE__'
              echo "${IMAGE_AZURE}:${VERSION}"
              echo "${IMAGE_AZURE}:devel"
              echo "${IMAGE_AZURE}:edge"
              echo '__THAUM_TAGS_AZURE__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_EXTERNAL<<__THAUM_TAGS_EXTERNAL__'
              echo "${IMAGE_EXTERNAL}:${VERSION}"
              echo "${IMAGE_EXTERNAL}:devel"
              echo "${IMAGE_EXTERNAL}:edge"
              echo '__THAUM_TAGS_EXTERNAL__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_AZURE_EXTERNAL<<__THAUM_TAGS_AZURE_EXTERNAL__'
              echo "${IMAGE_AZURE_EXTERNAL}:${VERSION}"
              echo "${IMAGE_AZURE_EXTERNAL}:devel"
              echo "${IMAGE_AZURE_EXTERNAL}:edge"
              echo '__THAUM_TAGS_AZURE_EXTERNAL__'
            } >> "$GITHUB_ENV"
          else
            THAUM_IMAGE_CHANNEL="latest"
            {
              echo 'TAGS<<__THAUM_TAGS__'
              echo "${IMAGE}:${VERSION}"
              echo "${IMAGE}:latest"
              echo "${IMAGE}:devel"
              echo "${IMAGE}:edge"
              echo '__THAUM_TAGS__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_AZURE<<__THAUM_TAGS_AZURE__'
              echo "${IMAGE_AZURE}:${VERSION}"
              echo "${IMAGE_AZURE}:latest"
              echo "${IMAGE_AZURE}:devel"
              echo "${IMAGE_AZURE}:edge"
              echo '__THAUM_TAGS_AZURE__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_EXTERNAL<<__THAUM_TAGS_EXTERNAL__'
              echo "${IMAGE_EXTERNAL}:${VERSION}"
              echo "${IMAGE_EXTERNAL}:latest"
              echo "${IMAGE_EXTERNAL}:devel"
              echo "${IMAGE_EXTERNAL}:edge"
              echo '__THAUM_TAGS_EXTERNAL__'
            } >> "$GITHUB_ENV"
            {
              echo 'TAGS_AZURE_EXTERNAL<<__THAUM_TAGS_AZURE_EXTERNAL__'
              echo "${IMAGE_AZURE_EXTERNAL}:${VERSION}"
              echo "${IMAGE_AZURE_EXTERNAL}:latest"
              echo "${IMAGE_AZURE_EXTERNAL}:devel"
              echo "${IMAGE_AZURE_EXTERNAL}:edge"
              echo '__THAUM_TAGS_AZURE_EXTERNAL__'
            } >> "$GITHUB_ENV"
          fi

          {
            echo "REGISTRY=${REGISTRY}"
            echo "IMAGE=${IMAGE}"
            echo "IMAGE_AZURE=${IMAGE_AZURE}"
            echo "IMAGE_EXTERNAL=${IMAGE_EXTERNAL}"
            echo "IMAGE_AZURE_EXTERNAL=${IMAGE_AZURE_EXTERNAL}"
            echo "VERSION=${VERSION}"
            echo "THAUM_IMAGE_VERSION=${VERSION}"
            echo "THAUM_IMAGE_CHANNEL=${THAUM_IMAGE_CHANNEL}"
            echo "GEMSTONE_UTILS_REF=${GEMSTONE_REF}"
            echo "PYTHON_VERSION=${PYVER}"
          } >> "$GITHUB_ENV"

      - name: Echo resolved image metadata
        run: |
          echo "REGISTRY=${{ env.REGISTRY }}"
          echo "IMAGE=${{ env.IMAGE }}"
          echo "IMAGE_AZURE=${{ env.IMAGE_AZURE }}"
          echo "IMAGE_EXTERNAL=${{ env.IMAGE_EXTERNAL }}"
          echo "IMAGE_AZURE_EXTERNAL=${{ env.IMAGE_AZURE_EXTERNAL }}"
          echo "VERSION=${{ env.VERSION }}"
          echo "THAUM_IMAGE_VERSION=${{ env.THAUM_IMAGE_VERSION }}"
          echo "THAUM_IMAGE_CHANNEL=${{ env.THAUM_IMAGE_CHANNEL }}"
          echo "PYTHON_VERSION=${{ env.PYTHON_VERSION }}"
          echo "TAGS:"
          printf '%s\n' "${{ env.TAGS }}"
          echo "TAGS_AZURE:"
          printf '%s\n' "${{ env.TAGS_AZURE }}"
          echo "TAGS_EXTERNAL:"
          printf '%s\n' "${{ env.TAGS_EXTERNAL }}"
          echo "TAGS_AZURE_EXTERNAL:"
          printf '%s\n' "${{ env.TAGS_AZURE_EXTERNAL }}"

      - name: Log in to GitHub Container Registry
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.REGISTRY == 'docker.io'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to other registry
        if: env.REGISTRY != 'ghcr.io' && env.REGISTRY != 'docker.io'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            GEMSTONE_UTILS_REF=${{ env.GEMSTONE_UTILS_REF }}
            THAUM_ENABLE_AZURE=0
            THAUM_BUNDLED_POSTGRES=1
            THAUM_IMAGE_VERSION=${{ env.THAUM_IMAGE_VERSION }}
            THAUM_IMAGE_CHANNEL=${{ env.THAUM_IMAGE_CHANNEL }}
          tags: ${{ env.TAGS }}

      - name: Build and push azure image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            GEMSTONE_UTILS_REF=${{ env.GEMSTONE_UTILS_REF }}
            THAUM_ENABLE_AZURE=1
            THAUM_BUNDLED_POSTGRES=1
            THAUM_IMAGE_VERSION=${{ env.THAUM_IMAGE_VERSION }}
            THAUM_IMAGE_CHANNEL=${{ env.THAUM_IMAGE_CHANNEL }}
          tags: ${{ env.TAGS_AZURE }}

      - name: Build and push external-db image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            GEMSTONE_UTILS_REF=${{ env.GEMSTONE_UTILS_REF }}
            THAUM_ENABLE_AZURE=0
            THAUM_BUNDLED_POSTGRES=0
            THAUM_IMAGE_VERSION=${{ env.THAUM_IMAGE_VERSION }}
            THAUM_IMAGE_CHANNEL=${{ env.THAUM_IMAGE_CHANNEL }}
          tags: ${{ env.TAGS_EXTERNAL }}

      - name: Build and push azure external-db image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            GEMSTONE_UTILS_REF=${{ env.GEMSTONE_UTILS_REF }}
            THAUM_ENABLE_AZURE=1
            THAUM_BUNDLED_POSTGRES=0
            THAUM_IMAGE_VERSION=${{ env.THAUM_IMAGE_VERSION }}
            THAUM_IMAGE_CHANNEL=${{ env.THAUM_IMAGE_CHANNEL }}
          tags: ${{ env.TAGS_AZURE_EXTERNAL }}

  package-thaum-utils:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Build thaum-utils archive
        run: |
          set -euo pipefail
          STAGING="thaum-utils"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -r quickstart docs scripts "$STAGING/"
          cp sample.thaum.toml incident_prompt_card.sample.j2 "$STAGING/"
          zip -r "thaum-utils-${{ github.ref_name }}.zip" "$STAGING"

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: thaum-utils-${{ github.ref_name }}.zip
